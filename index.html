<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban - Workflow visuel</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Barre d'ajout globale (cachée par défaut) -->
    <div id="global-add-bar" class="global-add-bar hidden">
        <input type="text" id="new-task-input" placeholder="Nom de la tâche...">
        <button id="confirm-add-btn">Ajouter</button>
        <button id="close-add-bar-btn">✕</button>
    </div>

    <div class="kanban-board" id="kanban-board"></div>

    <script src="index.js"></script>
</body>
</html>
